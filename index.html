<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云端对账系统 - 离线增强版</title>
    <!-- 引入官方 SDK，增加自动重试机制 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --p: #1677ff; --s: #52c41a; --d: #ff4d4f; --bg: #f4f7fa; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        #loginScreen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { width: 310px; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; left: -100%; z-index: 1000; height: 100%; } .sidebar.open { left: 0; } }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 60px; background: #fff; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-p { background: var(--p); color: #fff; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; width: 100%; outline: none; }
        .stat-card { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; border-top: 3px solid var(--p); }
        .cust-item { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .cust-item.active { background: #e6f4ff; border-left: 4px solid var(--p); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="color:var(--p); margin-top:0">工作台登录</h2>
        <div id="loadStatus" style="font-size:11px; color:#999; margin-bottom:20px">正在验证云端连接...</div>
        <input type="text" id="staffId" placeholder="工号">
        <input type="password" id="staffPass" placeholder="密码">
        <button class="btn btn-p" id="loginBtn" onclick="staffLogin()" style="width:100%">立即进入</button>
    </div>
</div>

<div id="appBody" style="display:none; width:100%; height:100%">
    <aside class="sidebar" id="sideNav">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
            <div style="font-size:12px; color:#888">工号: <b id="displayStaff" style="color:var(--p)"></b></div>
            <button class="btn" onclick="location.reload()" style="padding:0; background:none; color:var(--d)">退出</button>
        </div>
        <div style="padding:10px"><input type="text" id="cSearch" placeholder="搜索我的客户..." oninput="renderList()"></div>
        <div id="custList" style="flex:1; overflow-y:auto"></div>
        <div style="padding:15px"><button class="btn btn-p" style="width:100%" onclick="showM('custM')">+ 新建客户</button></div>
    </aside>
    <main class="main">
        <header class="top-bar">
            <button class="btn" onclick="toggleMenu()" style="background:#f0f0f0">☰</button>
            <div id="activeTitle" style="font-weight:700">请选择客户</div>
            <button class="btn" onclick="loadData()" style="font-size:12px; background:none; color:var(--p)">同步</button>
        </header>
        <div id="mainArea" style="flex:1; padding:15px; overflow-y:auto"></div>
    </main>
</div>

<!-- 弹窗 -->
<div id="custM" class="modal"><div class="modal-content">
    <h3>新建客户</h3>
    <input type="text" id="cN" placeholder="姓名">
    <input type="text" id="cA" placeholder="ID">
    <textarea id="cMemo" placeholder="备注" style="height:60px"></textarea>
    <button class="btn btn-p" style="width:100%" onclick="dbAddCust()">创建</button>
    <button class="btn" style="width:100%; margin-top:10px; background:none" onclick="hideM('custM')">取消</button>
</div></div>

<div id="billM" class="modal"><div class="modal-content">
    <h3>入账</h3>
    <input type="number" id="bA" placeholder="金额">
    <select id="bC"><option>微信</option><option>支付宝</option><option>U</option><option>银联</option></select>
    <input type="text" id="bN" placeholder="备注">
    <button class="btn btn-p" style="width:100%" onclick="dbAddBill()">确认</button>
    <button class="btn" style="width:100%; margin-top:10px; background:none" onclick="hideM('billM')">取消</button>
</div></div>

<script>
    const STAFF_DB = { "staff01": "111111", "staff02": "222222", "admin": "888888" };
    const S_URL = 'https://supabase.co'; 
    const S_KEY = '在此粘贴你的anon_public密钥'; 
    
    let dbClient, db = [], curIdx = -1, currentStaff = "";

    // 监控库加载
    const timer = setInterval(() => {
        if (window.supabase) {
            document.getElementById('loadStatus').innerText = "云端连接已就绪 (巴林节点已优化)";
            document.getElementById('loadStatus').style.color = "#52c41a";
            clearInterval(timer);
        }
    }, 500);

    function staffLogin() {
        if (!window.supabase) return alert("网络连接较慢，请稍等组件加载完成...");
        const id = document.getElementById('staffId').value;
        const pass = document.getElementById('staffPass').value;
        if (STAFF_DB[id] && STAFF_DB[id] === pass) {
            dbClient = supabase.createClient(S_URL, S_KEY);
            currentStaff = id;
            document.getElementById('displayStaff').innerText = id;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appBody').style.display = 'flex';
            loadData();
        } else alert('账号或密码错误');
    }

    async function loadData() {
        const { data, error } = await dbClient.from('customers').select('*').eq('owner', currentStaff).order('id', { ascending: false });
        db = data || []; renderList();
        if(curIdx !== -1) renderDetail();
    }

    async function dbAddCust() {
        const n = document.getElementById('cN').value;
        if(!n) return alert("姓名必填");
        await dbClient.from('customers').insert([{ name: n, account: document.getElementById('cA').value, memo: document.getElementById('cMemo').value, owner: currentStaff, records: [], pic: '', social: [] }]);
        hideM('custM'); loadData();
    }

    async function dbAddBill() {
        const amt = parseFloat(document.getElementById('bA').value);
        if(!amt) return;
        const c = db[curIdx];
        const records = [...(c.records || []), { at: new Date().toISOString(), amount: amt, channel: document.getElementById('bC').value, note: document.getElementById('bN').value }];
        await dbClient.from('customers').update({ records }).eq('id', c.id);
        hideM('billM'); loadData();
    }

    function renderList() {
        const key = document.getElementById('cSearch').value.toLowerCase();
        document.getElementById('custList').innerHTML = db.filter(c => (c.name||'').toLowerCase().includes(key)).map((c, i) => `
            <div class="cust-item ${curIdx === db.indexOf(c) ? 'active' : ''}" onclick="selectCust(${db.indexOf(c)})">
                <div style="flex:1"><div style="font-weight:600">${c.name}</div><div style="font-size:11px;color:#999">${c.account}</div></div>
            </div>`).join('');
    }

    function selectCust(i) { curIdx = i; renderList(); renderDetail(); if(window.innerWidth < 768) toggleMenu(); }

    function renderDetail() {
        const c = db[curIdx];
        const total = (c.records || []).reduce((s, r) => s + r.amount, 0);
        document.getElementById('activeTitle').innerText = c.name;
        document.getElementById('mainArea').innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <div><b>${c.name}</b><br><small>${c.account}</small></div>
                <button class="btn btn-p" onclick="showM('billM')">记账</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px">
                <div class="stat-card"><small>累计</small><div>¥${total.toLocaleString()}</div></div>
                <div class="stat-card"><small>笔数</small><div>${(c.records||[]).length}</div></div>
            </div>
            <div style="background:#fff; border-radius:10px; overflow:hidden">
                ${(c.records || []).map((r, ri) => `<div style="padding:10px; border-bottom:1px solid #f5f5f5; display:flex; justify-content:space-between; font-size:13px">
                    <div><b>${r.channel}</b><br><small>${new Date(r.at).toLocaleDateString()}</small></div>
                    <div style="text-align:right"><b>¥${r.amount}</b><br><a href="#" onclick="delBill(${ri})" style="color:var(--d);font-size:10px">撤销</a></div>
                </div>`).reverse().join('')}
            </div>`;
    }

    async function delBill(idx) {
        if(confirm('撤销？')) {
            const c = db[curIdx]; c.records.splice(idx, 1);
            await dbClient.from('customers').update({ records: c.records }).eq('id', c.id);
            loadData();
        }
    }

    function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
    function showM(id) { document.getElementById(id).style.display = 'flex'; }
    function hideM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
