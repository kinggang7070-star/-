<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云财务中心</title>
    <!-- 多线备用加载：确保核心组件 100% 成功 -->
    <script src="https://jsdelivr.net"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<script src="https://unpkg.com"><\/script>');
        }
    </script>
    <style>
        :root { --p: #1677ff; --s: #52c41a; --d: #ff4d4f; --bg: #f4f7fa; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* 验证锁屏 */
        #lockScreen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 界面布局 */
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; left: -100%; z-index: 1000; height: 100%; } .sidebar.open { left: 0; } }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-bar { height: 60px; background: #fff; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        .content { flex: 1; overflow-y: auto; padding: 15px; }

        /* 卡片与数据 */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee; border-top: 3px solid #ddd; }
        .stat-v { font-size: 18px; font-weight: 700; margin: 5px 0; color: var(--p); }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-p { background: var(--p); color: #fff; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; width: 100%; outline: none; }

        .cust-item { padding: 12px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .cust-item.active { background: #e6f4ff; border-left: 4px solid var(--p); }
        .av { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #eee; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; }
    </style>
</head>
<body>

    <!-- 登录锁屏 -->
    <div id="lockScreen">
        <h2 style="color:var(--p)">云财务系统验证</h2>
        <div id="loadStatus" style="font-size:12px; color:#999; margin-bottom:10px">正在建立云端安全连接...</div>
        <input type="password" id="sysPass" placeholder="请输入访问密码" style="width:250px; text-align:center">
        <button class="btn btn-p" onclick="checkPass()" style="width:250px">解锁进入</button>
        <button class="btn" onclick="location.reload()" style="margin-top:15px; font-size:11px; background:none; color:#999">如果一直显示连接中，请点此刷新</button>
    </div>

    <!-- 主程序 -->
    <div id="appBody" style="display:none; width:100%; height:100%">
        <aside class="sidebar" id="sideNav">
            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center">
                <b style="color:var(--p)">客户列表</b>
                <button class="btn" onclick="toggleMenu()" style="padding:5px">隐藏</button>
            </div>
            <div style="padding:10px"><input type="text" id="cSearch" placeholder="搜索姓名/账号..." oninput="renderList()"></div>
            <div class="cust-list" id="custList" style="flex:1; overflow-y:auto"></div>
            <div style="padding:15px; border-top:1px solid #eee"><button class="btn btn-p" style="width:100%" onclick="showM('custM')">+ 新增客户</button></div>
        </aside>

        <main class="main">
            <header class="top-bar">
                <button class="btn" onclick="toggleMenu()" style="background:#f0f0f0">☰ 客户</button>
                <div id="activeTitle" style="font-weight:700">请选择客户</div>
                <button class="btn" onclick="loadData()" style="font-size:12px">刷新同步</button>
            </header>
            <div class="content" id="mainArea">
                <div style="text-align:center; color:#bfbfbf; margin-top:100px">云端数据库已就绪</div>
            </div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div id="custM" class="modal"><div class="modal-content">
        <h3>新建客户档案</h3>
        <input type="text" id="cN" placeholder="客户姓名 (必填)">
        <input type="text" id="cA" placeholder="客户账号 / 唯一ID">
        <textarea id="cMemo" placeholder="备注信息" style="height:60px"></textarea>
        <button class="btn btn-p" style="width:100%" onclick="dbAddCust()">确认保存</button>
        <button class="btn" style="width:100%; margin-top:10px; background:none" onclick="hideM('custM')">取消</button>
    </div></div>

    <div id="billM" class="modal"><div class="modal-content">
        <h3>新增一笔入账</h3>
        <input type="number" id="bA" placeholder="金额">
        <select id="bC"><option>微信</option><option>支付宝</option><option>U</option><option>银联</option></select>
        <input type="text" id="bN" placeholder="流水备注">
        <button class="btn btn-p" style="width:100%" onclick="dbAddBill()">入账</button>
        <button class="btn" style="width:100%; margin-top:10px; background:none" onclick="hideM('billM')">取消</button>
    </div></div>

<script>
    // --- 1. 配置区 ---
    const S_URL = 'https://supabase.co';
    const S_KEY = '在此粘贴你的anon_public密钥'; 
    const ACCESS_PASS = '123456'; 
    
    let dbClient, db = [], curIdx = -1;

    // 自动监控库加载状态
    const checkTimer = setInterval(() => {
        const status = document.getElementById('loadStatus');
        if (typeof supabase !== 'undefined') {
            status.innerText = "云端安全连接已建立";
            status.style.color = "#52c41a";
            clearInterval(checkTimer);
        }
    }, 500);

    function checkPass() {
        if(document.getElementById('sysPass').value === ACCESS_PASS) {
            if (typeof supabase === 'undefined') {
                alert("核心组件加载中，请稍候再试。若长时间不行，请刷新页面。");
                return;
            }
            // 正式初始化
            dbClient = supabase.createClient(S_URL, S_KEY);
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('appBody').style.display = 'flex';
            loadData();
        } else { alert('密码验证失败'); }
    }

    // --- 2. 数据库操作 ---
    async function loadData() {
        const { data, error } = await dbClient.from('customers').select('*').order('id', { ascending: false });
        if(error) return;
        db = data || [];
        renderList();
        if(curIdx !== -1) renderDetail();
    }

    async function dbAddCust() {
        const n = document.getElementById('cN').value, a = document.getElementById('cA').value, m = document.getElementById('cMemo').value;
        if(!n) return alert("姓名不能为空");

        const { error } = await dbClient.from('customers').insert([{ name: n, account: a, memo: m, records: [], pic: '', social: [] }]);
        if (error) alert("数据库拒绝保存: " + error.message);
        else { alert("档案创建成功"); hideM('custM'); loadData(); }
    }

    async function dbAddBill() {
        const amt = parseFloat(document.getElementById('bA').value);
        if(!amt) return alert("请输入正确金额");
        const c = db[curIdx];
        const newRecords = [...(c.records || []), { at: new Date().toISOString(), amount: amt, channel: document.getElementById('bC').value, note: document.getElementById('bN').value }];
        const { error } = await dbClient.from('customers').update({ records: newRecords }).eq('id', c.id);
        if(error) alert("入账同步失败: " + error.message);
        else { hideM('billM'); loadData(); }
    }

    // --- 3. 界面渲染 ---
    function renderList() {
        const key = document.getElementById('cSearch').value.toLowerCase();
        const list = document.getElementById('custList');
        list.innerHTML = db.filter(c => (c.name||'').toLowerCase().includes(key) || (c.account||'').toLowerCase().includes(key)).map((c, i) => `
            <div class="cust-item ${curIdx === db.indexOf(c) ? 'active' : ''}" onclick="selectCust(${db.indexOf(c)})">
                <img class="av" src="${c.pic || 'https://placeholder.com'}">
                <div style="flex:1"><div style="font-weight:600;font-size:14px">${c.name}</div><div style="font-size:11px;color:#9ca3af">${c.account}</div></div>
            </div>`).join('');
    }

    function selectCust(i) { curIdx = i; renderList(); renderDetail(); if(window.innerWidth < 768) toggleMenu(); }

    function renderDetail() {
        const c = db[curIdx];
        const total = (c.records || []).reduce((s, r) => s + r.amount, 0);
        document.getElementById('activeTitle').innerText = c.name;
        document.getElementById('mainArea').innerHTML = `
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px">
                <img src="${c.pic || ''}" style="width:60px; height:60px; border-radius:12px; background:#ddd; object-fit:cover" onclick="document.getElementById('upI').click()">
                <input type="file" id="upI" hidden onchange="upAvatar(this)">
                <div style="flex:1"><b>${c.name}</b><br><small style="color:#999">ID: ${c.account}</small></div>
                <button class="btn btn-p" onclick="showM('billM')">记一笔</button>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><small>累计存款</small><div class="stat-v">¥${total}</div></div>
                <div class="stat-card"><small>笔数</small><div class="stat-v">${(c.records||[]).length}</div></div>
            </div>
            <div style="background:#fff; border-radius:10px; overflow:hidden">
                ${(c.records || []).map((r, ri) => `
                    <div style="padding:12px; border-bottom:1px solid #f5f5f5; display:flex; justify-content:space-between">
                        <div><small style="color:#ccc; font-size:10px">${new Date(r.at).toLocaleDateString()}</small><br><b>${r.channel}</b></div>
                        <div style="text-align:right"><b>¥${r.amount}</b><br><a href="javascript:;" onclick="delBill(${ri})" style="color:var(--d);font-size:10px">撤销</a></div>
                    </div>`).reverse().join('')}
            </div>`;
    }

    async function upAvatar(input) {
        const reader = new FileReader();
        reader.onload = async e => {
            await dbClient.from('customers').update({ pic: e.target.result }).eq('id', db[curIdx].id);
            loadData();
        };
        reader.readAsDataURL(input.files);
    }

    async function delBill(idx) {
        if(confirm('确认撤销流水？')) {
            const c = db[curIdx]; c.records.splice(idx, 1);
            await dbClient.from('customers').update({ records: c.records }).eq('id', c.id);
            loadData();
        }
    }

    function toggleMenu() { document.getElementById('sideNav').classList.toggle('open'); }
    function showM(id) { document.getElementById(id).style.display = 'flex'; }
    function hideM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
